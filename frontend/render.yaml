services:
  - type: web
    name: crm-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NPM_VERSION
        value: 10.5.0
      - key: VITE_API_URL
        value: https://crm-backend-cw8h.onrender.com